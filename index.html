
<!DOCTYPE html>
<html lang="it" style="scroll-behavior: smooth;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muramasa</title>
    
    <!-- Fonts Google -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&amp;family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

    <!-- Tailwind CDN per Anteprima Immediata -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              sage: {
                50: "#f4f7f5",
                100: "#e9f0ea",
                200: "#d3e1d5",
                300: "#b5cbb7",
                400: "#9ebba1",
                500: "#86a889", // Sage Green base
                600: "#6b8a6e",
                700: "#5d7a60",
                800: "#4a614d",
                900: "#3d5240",
              },
              wood: {
                100: "#f0e6dd",
                200: "#e0d0c2",
                300: "#cbbba9",
                400: "#a98b73",
                500: "#8b5e3c",
                600: "#6f4b30",
                700: "#5d3f28",
                800: "#4a3b32", // Dark Wood
                900: "#2e241e",
              },
              cream: "#f9f7f2", // Off-white
              paper: "#ffffff",
            },
            fontFamily: {
              sans: ["Outfit", "sans-serif"],
              serif: ["Playfair Display", "serif"],
            },
            backgroundImage: {
              'wood-texture': "linear-gradient(rgba(46, 36, 30, 0.9), rgba(46, 36, 30, 0.9)), url('https://www.transparenttextures.com/patterns/wood-pattern.png')",
              'washi-paper': "url('https://www.transparenttextures.com/patterns/cream-paper.png')",
            }
          }
        }
      }
    </script>

    <!-- Import Map per compatibilità Preview -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",

    "react/": "https://esm.sh/react@^19.2.4/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>

</html>
